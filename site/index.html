<style>
  html,body{margin:0;background:var(--surface-page);font-family:var(--font-body);color:var(--text-strong)}
  a{color:var(--color-brand)}a:hover{color:var(--color-brand-strong)}
  :focus-visible{outline:3px solid var(--color-brand);outline-offset:2px;border-radius:2px}
  #root{min-height:100vh;display:flex;flex-direction:column}
  main{flex:1}
  .gepco-hscroll{scrollbar-width:thin;scrollbar-color:var(--border-hover) transparent}
  .gepco-hscroll::-webkit-scrollbar{height:8px}.gepco-hscroll::-webkit-scrollbar-thumb{background:var(--border-hover);border-radius:99px}.gepco-hscroll::-webkit-scrollbar-track{background:transparent}
  @keyframes gepco-marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  .gepco-marquee-mask{-webkit-mask-image:linear-gradient(90deg,transparent,#000 8%,#000 92%,transparent);mask-image:linear-gradient(90deg,transparent,#000 8%,#000 92%,transparent)}
  .gepco-marquee-track{display:flex;width:max-content;animation:gepco-marquee 48s linear infinite}
  .gepco-marquee-mask:hover .gepco-marquee-track{animation-play-state:paused}
  @media (prefers-reduced-motion: reduce){*{animation-duration:0.001ms!important;transition-duration:0.001ms!important;scroll-behavior:auto!important}}
</style>

<script type="text/babel" data-presets="react">
function mount(){
  const need = ["Navbar","Footer","Container","HomeScreen"];
  if(!need.every(function(n){return window[n];})){ setTimeout(mount, 40); return; }
  ReactDOM.createRoot(document.getElementById("root")).render(
    <React.Fragment>
      <window.Navbar onNav={window.onNav} />
      <main><window.HomeScreen onNav={window.onNav} /></main>
      <window.Footer />
    </React.Fragment>
  );
}
mount();
</script>
